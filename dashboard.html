<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Commodex Research Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0908; color: #d4c4a0; font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

    .header { background: #0f0e0b; border-bottom: 1px solid #2a2820; padding: 0 24px; height: 48px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; color: #e8d8b0; }
    .logo-sub { font-family: 'DM Mono', monospace; font-size: 8px; color: #c8a870; letter-spacing: 3px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .header-ts { font-family: 'DM Mono', monospace; font-size: 9px; color: #8a7a60; }
    .refresh-btn { background: none; border: 1px solid #3a3428; color: #c8a870; padding: 4px 10px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; }
    .refresh-btn:hover { color: #e8d8b0; border-color: #5a4a38; }
    .run-btn { background: #c8a870; border: none; color: #0a0908; padding: 4px 10px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; letter-spacing: 1px; }
    .run-btn:hover { background: #e8d8b0; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .signout-btn { background: none; border: none; color: #6a5a40; font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; letter-spacing: 1px; }
    .signout-btn:hover { color: #c8a870; }
    .verify-banner { background: #1a1500; border-bottom: 1px solid #c8a87040; padding: 8px 24px; font-family: 'DM Mono', monospace; font-size: 10px; color: #c8a870; display: flex; align-items: center; gap: 12px; }
    .verify-banner button { background: none; border: 1px solid #c8a87060; color: #c8a870; padding: 3px 10px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; letter-spacing: 1px; }
    .verify-banner button:hover { background: #c8a87020; }
    .verify-banner.hidden { display: none; }

    /* Login overlay */
    .login-overlay { position: fixed; inset: 0; background: rgba(10,9,8,0.97); z-index: 999; display: flex; align-items: center; justify-content: center; }
    .login-overlay.hidden { display: none; }
    .login-box { width: 360px; border: 1px solid #2a2820; border-radius: 6px; padding: 36px; background: #0d0c0a; }
    .login-logo { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 300; color: #e8d8b0; margin-bottom: 4px; }
    .login-sub { font-family: 'DM Mono', monospace; font-size: 8px; color: #c8a870; letter-spacing: 3px; margin-bottom: 32px; }
    .login-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 2px; color: #8a7a60; margin-bottom: 6px; display: block; }
    .login-input { width: 100%; background: #0a0908; border: 1px solid #2a2820; color: #d4c4a0; padding: 9px 12px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 12px; margin-bottom: 16px; outline: none; }
    .login-input:focus { border-color: #5a4a38; }
    .login-btn { width: 100%; background: #c8a870; color: #0a0908; border: none; padding: 10px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; cursor: pointer; margin-top: 4px; }
    .login-btn:hover { background: #e8d8b0; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { font-family: 'DM Mono', monospace; font-size: 10px; color: #f87171; margin-top: 12px; min-height: 16px; text-align: center; }
    .login-toggle { font-family: 'DM Mono', monospace; font-size: 9px; color: #6a5a40; text-align: center; margin-top: 20px; cursor: pointer; }
    .login-toggle span { color: #c8a870; cursor: pointer; }
    .login-toggle span:hover { color: #e8d8b0; }

    .tabs { background: #0d0c0a; border-bottom: 1px solid #2a2820; padding: 0 24px; display: flex; overflow-x: auto; }
    .tab { padding: 10px 16px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #8a7a60; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover { color: #d4c4a0; }

    .commodity-header { background: #0d0c0a; border-bottom: 1px solid #2a2820; padding: 14px 24px; display: flex; align-items: center; gap: 20px; }
    .comm-name { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 300; }
    .comm-price-block { display: flex; flex-direction: column; gap: 2px; }
    .comm-price { font-family: 'DM Mono', monospace; font-size: 20px; color: #e8d8b0; }
    .comm-change { font-family: 'DM Mono', monospace; font-size: 11px; }
    .comm-change.up { color: #4ade80; }
    .comm-change.down { color: #f87171; }
    .comm-change.flat { color: #fbbf24; }
    .divider { width: 1px; height: 32px; background: #2a2820; }
    .sentiment-block { display: flex; flex-direction: column; gap: 5px; }
    .sentiment-label { font-family: 'DM Mono', monospace; font-size: 8px; color: #8a7a60; letter-spacing: 2px; }
    .sentiment-meter { display: flex; gap: 3px; align-items: center; }
    .sentiment-step { height: 6px; width: 28px; border-radius: 1px; background: #2a2820; }
    .sentiment-text { font-family: 'DM Mono', monospace; font-size: 10px; margin-left: 8px; letter-spacing: 1px; }
    .analysis-ts { font-family: 'DM Mono', monospace; font-size: 9px; color: #6a5a40; margin-left: auto; text-align: right; line-height: 1.6; }

    .main { display: flex; height: calc(100vh - 100px); min-height: 500px; }

    .news-col { width: 20%; border-right: 1px solid #2a2820; display: flex; flex-direction: column; overflow: hidden; }
    .col-header { padding: 10px 16px; border-bottom: 1px solid #2a2820; font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 2.5px; color: #8a7a60; display: flex; align-items: center; }
    .col-count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 8px; color: #6a5a40; }
    .news-list { flex: 1; overflow-y: auto; }
    .news-item { padding: 11px 16px; border-bottom: 1px solid #161412; cursor: pointer; transition: background 0.1s; text-decoration: none; display: block; }
    .news-item:hover { background: #0d0c0a; }
    .news-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
    .news-source { font-family: 'DM Mono', monospace; font-size: 8px; color: #c8a870; }
    .news-time { font-family: 'DM Mono', monospace; font-size: 8px; color: #6a5a40; margin-left: auto; }
    .news-title { font-size: 12px; color: #c4b490; line-height: 1.5; }
    .impact-tag { font-family: 'DM Mono', monospace; font-size: 7px; letter-spacing: 1px; padding: 1px 5px; border-radius: 2px; flex-shrink: 0; }
    .impact-HIGH { background: #301a10; color: #fb923c; border: 1px solid #fb923c30; }
    .impact-MEDIUM { background: #1a2030; color: #60a5fa; border: 1px solid #60a5fa30; }
    .impact-LOW { background: #1a1a1a; color: #6a6a6a; border: 1px solid #3a3a3a30; }

    .analysis-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .analysis-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

    .section-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 2.5px; color: #8a7a60; margin-bottom: 10px; }
    .briefing-text { font-size: 13px; line-height: 1.9; color: #c4b490; font-weight: 300; }
    .briefing-text p { margin-bottom: 14px; }
    .briefing-text p:last-child { margin-bottom: 0; }

    .takeaway-box { background: #0d0c0a; border: 1px solid #2a2820; border-radius: 4px; padding: 16px; }
    .takeaway-bias { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; margin-bottom: 12px; padding: 5px 10px; border-radius: 3px; display: inline-block; }
    .takeaway-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px; }
    .takeaway-item-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1.5px; color: #8a7a60; margin-bottom: 5px; }
    .takeaway-item-value { font-size: 12px; color: #c4b490; line-height: 1.5; }
    .meta-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; padding: 4px 10px; border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; }
    .price-context-box { background: #0d0c0a; border: 1px solid #2a2820; border-left: 3px solid #5a4a38; border-radius: 4px; padding: 12px 16px; font-size: 12px; color: #c4b490; line-height: 1.6; }
    .timeframe-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .timeframe-card { background: #0d0c0a; border: 1px solid #2a2820; border-radius: 4px; padding: 14px; }
    .timeframe-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 2px; color: #8a7a60; margin-bottom: 8px; }
    .timeframe-value { font-size: 12px; color: #c4b490; line-height: 1.6; }
    .drivers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .driver-col { background: #0d0c0a; border: 1px solid #2a2820; border-radius: 4px; padding: 14px; }
    .driver-col-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 2px; margin-bottom: 10px; }
    .driver-col-up .driver-col-label { color: #4ade80; }
    .driver-col-down .driver-col-label { color: #f87171; }
    .driver-item { font-size: 11px; color: #c4b490; padding: 4px 0; border-bottom: 1px solid #1a1816; line-height: 1.5; display: flex; gap: 6px; }
    .driver-item:last-child { border-bottom: none; }
    .driver-dot-up { color: #4ade80; flex-shrink: 0; }
    .driver-dot-down { color: #f87171; flex-shrink: 0; }
    .hist-bar-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .hist-bar-label { font-family: 'DM Mono', monospace; font-size: 8px; color: #8a7a60; width: 120px; flex-shrink: 0; }
    .hist-bar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .hist-bar-sentiment { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1px; }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-thumb { background: #3a3428; border-radius: 1px; }
    .loading { padding: 32px 20px; font-family: 'DM Mono', monospace; font-size: 10px; color: #6a5a40; letter-spacing: 1px; }
    .section-card { background: #0d0c0a; border: 1px solid #2a2820; border-radius: 4px; padding: 16px; }
  </style>
</head>
<body>

<div class="header">
  <span class="logo">Commodex</span>
  <span class="logo-sub">RESEARCH TERMINAL</span>
  <div class="header-right">
    <div class="live-dot"></div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <a href="/analytics" style="background:none;border:1px solid #3a3428;color:#8a7a60;padding:4px 10px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;letter-spacing:1px;text-decoration:none">ANALYTICS</a>
    <button class="run-btn" id="run-btn" onclick="triggerRun()">▶ RUN NOW</button>
    <button class="signout-btn" onclick="signOut()">SIGN OUT</button>
  </div>
</div>

<div class="verify-banner hidden" id="verify-banner">
  ⚠ Your email is not verified. Check your inbox.
  <button onclick="resendVerification()">Resend Email</button>
  <span id="verify-msg" style="color:#4ade80;font-size:9px"></span>
</div>

<!-- Login overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-logo">Commodex</div>
    <div class="login-sub">RESEARCH TERMINAL</div>
    <div id="login-form">
      <label class="login-label">EMAIL</label>
      <input class="login-input" type="email" id="login-email" placeholder="you@example.com" />
      <label class="login-label">PASSWORD</label>
      <input class="login-input" type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitLogin()" />
      <button class="login-btn" id="login-btn" onclick="submitLogin()">SIGN IN</button>
      <div class="login-error" id="login-error"></div>
      <div class="login-toggle">No account? <span onclick="showRegister()">Register</span></div>
      <div class="login-toggle" style="margin-top:12px">Forgot password? <span onclick="showForgot()">Reset it</span></div>
    </div>
    <div id="register-form" style="display:none">
      <label class="login-label">EMAIL</label>
      <input class="login-input" type="email" id="reg-email" placeholder="you@example.com" />
      <label class="login-label">PASSWORD</label>
      <input class="login-input" type="password" id="reg-password" placeholder="Min 8 characters" onkeydown="if(event.key==='Enter')submitRegister()" />
      <button class="login-btn" id="reg-btn" onclick="submitRegister()">CREATE ACCOUNT</button>
      <div class="login-error" id="reg-error"></div>
      <div class="login-toggle">Have an account? <span onclick="showLogin()">Sign in</span></div>
    </div>
    <div id="forgot-form" style="display:none">
      <label class="login-label">EMAIL</label>
      <input class="login-input" type="email" id="forgot-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')submitForgot()" />
      <button class="login-btn" id="forgot-btn" onclick="submitForgot()">SEND RESET LINK</button>
      <div class="login-error" id="forgot-msg" style="min-height:16px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;margin-top:12px"></div>
      <div class="login-toggle">Remember it? <span onclick="showLogin()">Sign in</span></div>
    </div>
    <div id="reset-form" style="display:none">
      <label class="login-label">NEW PASSWORD</label>
      <input class="login-input" type="password" id="reset-password" placeholder="Min 8 characters" onkeydown="if(event.key==='Enter')submitReset()" />
      <button class="login-btn" id="reset-btn" onclick="submitReset()">SET NEW PASSWORD</button>
      <div class="login-error" id="reset-msg" style="min-height:16px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;margin-top:12px"></div>
    </div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="commodity-header" id="commodity-header">
  <div class="loading">Loading...</div>
</div>

<div class="main">
  <div class="news-col">
    <div class="col-header">
      NEWS FEED
      <span class="col-count" id="news-count"></span>
    </div>
    <div class="news-list" id="news-list"><div class="loading">Loading...</div></div>
  </div>
  <div class="analysis-col">
    <div class="analysis-body" id="analysis-body">
      <div class="loading">Fetching analysis...</div>
    </div>
  </div>
</div>

<script>
  // ── Auth helpers ─────────────────────────────────────────────────────────────
  const getAccess  = () => localStorage.getItem("access_token");
  const getRefresh = () => localStorage.getItem("refresh_token");

  function authHeaders() {
    const t = getAccess();
    return t ? { "Authorization": "Bearer " + t, "Content-Type": "application/json" } : { "Content-Type": "application/json" };
  }

  async function refreshToken() {
    const rt = getRefresh();
    if (!rt) return false;
    try {
      const res = await fetch("/auth/refresh", { method: "POST", headers: { "Authorization": "Bearer " + rt } });
      if (!res.ok) return false;
      const d = await res.json();
      localStorage.setItem("access_token", d.access_token);
      return true;
    } catch { return false; }
  }

  async function apiFetch(url, opts) {
    const options = opts || {};
    const method  = options.method || "GET";
    let res = await fetch(url, { method, headers: authHeaders(), body: options.body });
    if (res.status === 401) {
      const ok = await refreshToken();
      if (ok) res = await fetch(url, { method, headers: authHeaders(), body: options.body });
      else { showLoginOverlay(); return null; }
    }
    return res;
  }

  function showLoginOverlay() {
    document.getElementById("login-overlay").classList.remove("hidden");
    showLogin();
  }

  function hideLoginOverlay() {
    document.getElementById("login-overlay").classList.add("hidden");
  }

  function showLogin() {
    document.getElementById("login-form").style.display = "";
    document.getElementById("register-form").style.display = "none";
    document.getElementById("forgot-form").style.display = "none";
    document.getElementById("reset-form").style.display = "none";
    document.getElementById("login-error").textContent = "";
  }

  function showRegister() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("register-form").style.display = "";
    document.getElementById("forgot-form").style.display = "none";
    document.getElementById("reset-form").style.display = "none";
    document.getElementById("reg-error").textContent = "";
  }

  async function submitLogin() {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const btn      = document.getElementById("login-btn");
    const errEl    = document.getElementById("login-error");
    btn.disabled = true; errEl.textContent = "";
    try {
      const res  = await fetch("/auth/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || "Login failed."; return; }
      localStorage.setItem("access_token",  data.access_token);
      localStorage.setItem("refresh_token", data.refresh_token);
      hideLoginOverlay();
      loadData(); loadPrices();
      if (data.email_verified === false) {
        checkVerificationBanner(false);
      }
    } catch { errEl.textContent = "Connection error."; }
    finally  { btn.disabled = false; }
  }

  async function submitRegister() {
    const email    = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    const btn      = document.getElementById("reg-btn");
    const errEl    = document.getElementById("reg-error");
    btn.disabled = true; errEl.textContent = "";
    try {
      const res  = await fetch("/auth/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || "Registration failed."; return; }
      errEl.style.color = "#4ade80";
      errEl.textContent = "Account created. Sign in below.";
      setTimeout(showLogin, 1200);
    } catch { errEl.textContent = "Connection error."; }
    finally  { btn.disabled = false; }
  }

  function signOut() {
    localStorage.removeItem("access_token");
    localStorage.removeItem("refresh_token");
    showLoginOverlay();
  }

  // ── App ───────────────────────────────────────────────────────────────────────
  const COLORS = {
    "Gold": "#c9a84c", "Crude Oil": "#b85c38",
    "Silver": "#8faabf", "Copper": "#b87040", "Natural Gas": "#5a9e8f"
  };

  const DECIMALS = {
    "Gold": 1, "Crude Oil": 2, "Silver": 3, "Copper": 4, "Natural Gas": 3
  };

  let data = {}, activeTab = "Gold", priceCache = {};

  async function loadPrices() {
    try {
      const res = await apiFetch("/prices");
      if (!res) return;
      priceCache = await res.json();
      renderCommodityHeader(activeTab);
    } catch(e) {}
  }

  const SENTIMENTS = ["STRONG_BEARISH", "BEARISH", "NEUTRAL", "BULLISH", "STRONG_BULLISH"];
  const SENTIMENT_LABELS = { "STRONG_BEARISH": "STRONG BEARISH", "BEARISH": "BEARISH", "NEUTRAL": "NEUTRAL", "BULLISH": "BULLISH", "STRONG_BULLISH": "STRONG BULLISH" };
  const SENTIMENT_COLORS = { "STRONG_BEARISH": "#ef4444", "BEARISH": "#f87171", "NEUTRAL": "#fbbf24", "BULLISH": "#86efac", "STRONG_BULLISH": "#22c55e" };

  function renderSentimentMeter(sentiment) {
    const idx = SENTIMENTS.indexOf(sentiment);
    const color = SENTIMENT_COLORS[sentiment] || "#fbbf24";
    let steps = "";
    for (let i = 0; i < 5; i++) {
      const stepColor = i <= idx ? SENTIMENT_COLORS[SENTIMENTS[i]] : "#2a2820";
      steps += `<div class="sentiment-step" style="background:${stepColor}"></div>`;
    }
    return `<div class="sentiment-block">
      <div class="sentiment-label">SENTIMENT</div>
      <div class="sentiment-meter">${steps}<span class="sentiment-text" style="color:${color}">${SENTIMENT_LABELS[sentiment] || "NEUTRAL"}</span></div>
    </div>`;
  }

  function renderCommodityHeader(name) {
    const color = COLORS[name];
    const d = data[name];
    const sentiment = d?.analysis?.sentiment || "NEUTRAL";
    const pd = priceCache[name];
    const decimals = DECIMALS[name];
    const price = pd?.price ? "$" + pd.price.toFixed(decimals) : "—";
    const chg = pd?.change;
    const chgClass = chg > 0 ? "up" : chg < 0 ? "down" : "flat";
    const chgStr = chg != null ? (chg >= 0 ? "▲ " : "▼ ") + Math.abs(chg).toFixed(2) + "%" : "";

    document.getElementById("commodity-header").innerHTML = `
      <div class="comm-name" style="color:${color}">${name}</div>
      <div class="comm-price-block">
        <div class="comm-price">${price}</div>
        <div class="comm-change ${chgClass}">${chgStr}</div>
      </div>
      <div class="divider"></div>
      ${renderSentimentMeter(sentiment)}
      <div class="analysis-ts">${d ? "Generated " + d.timestamp + "<br>" + d.count + " articles" : ""}</div>
    `;
  }

  const CONFIDENCE_COLORS = { "HIGH": "#4ade80", "MEDIUM": "#fbbf24", "LOW": "#f87171" };
  const NARRATIVE_COLORS = { "Strengthening": "#4ade80", "Stable": "#fbbf24", "Weakening": "#f87171", "Shifting": "#818cf8" };

  function renderAnalysisBody(name) {
    const d = data[name];
    if (!d) return;
    const a = d.analysis;

    // Market summary
    const summaryHtml = (a.market_summary || a.briefing || "")
      .split(/\n{2,}/).map(p => p.replace(/\n/g, " ").trim()).filter(p => p.length > 10)
      .map(p => `<p>${p}</p>`).join("") || "<p>No summary available.</p>";

    // Confidence badge
    const conf = a.confidence || "LOW";
    const confColor = CONFIDENCE_COLORS[conf] || "#fbbf24";

    // Dominant narrative badge
    const dn = a.dominant_narrative || {};
    const narStatus = dn.status || "";
    const narColor = NARRATIVE_COLORS[narStatus] || "#8a7a60";

    // Price action context
    const pac = a.price_action_context || "—";

    // Trader takeaways
    const tt = a.trader_takeaways || {};

    // Takeaway
    const tk = a.takeaway || {};
    const bias = tk.bias || "Neutral";
    const biasColor = bias.toLowerCase().includes("bull") ? "#4ade80" : bias.toLowerCase().includes("bear") ? "#f87171" : "#fbbf24";

    // Drivers
    const driversUp   = (a.drivers?.up   || []).map(d => `<div class="driver-item"><span class="driver-dot-up">▲</span>${d}</div>`).join("") || "<div class='driver-item' style='color:#6a5a40'>None identified</div>";
    const driversDown = (a.drivers?.down || []).map(d => `<div class="driver-item"><span class="driver-dot-down">▼</span>${d}</div>`).join("") || "<div class='driver-item' style='color:#6a5a40'>None identified</div>";

    document.getElementById("analysis-body").innerHTML = `
      <div class="section-card">
        <div class="section-label">MARKET SUMMARY</div>
        <div class="briefing-text">${summaryHtml}</div>
      </div>

      <div class="meta-row">
        <div class="badge" style="background:${confColor}18;color:${confColor};border:1px solid ${confColor}35">
          <span style="font-size:7px">CONFIDENCE</span> ${conf}
        </div>
        ${dn.theme && dn.theme !== "—" ? `
        <div class="badge" style="background:${narColor}18;color:${narColor};border:1px solid ${narColor}35">
          <span style="font-size:7px">NARRATIVE</span> ${dn.theme} &nbsp;·&nbsp; ${narStatus}
        </div>` : ""}
      </div>

      <div>
        <div class="section-label">MARKET DRIVERS</div>
        <div class="drivers-grid">
          <div class="driver-col driver-col-up">
            <div class="driver-col-label">BULLISH FACTORS</div>
            ${driversUp}
          </div>
          <div class="driver-col driver-col-down">
            <div class="driver-col-label">BEARISH FACTORS</div>
            ${driversDown}
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">PRICE ACTION CONTEXT</div>
        <div class="price-context-box">${pac}</div>
      </div>

      <div>
        <div class="section-label">TRADER TAKEAWAYS</div>
        <div class="timeframe-grid">
          <div class="timeframe-card">
            <div class="timeframe-label">INTRADAY</div>
            <div class="timeframe-value">${tt.intraday || "—"}</div>
          </div>
          <div class="timeframe-card">
            <div class="timeframe-label">NEXT FEW DAYS</div>
            <div class="timeframe-value">${tt.next_few_days || "—"}</div>
          </div>
          <div class="timeframe-card">
            <div class="timeframe-label">NEXT FEW WEEKS</div>
            <div class="timeframe-value">${tt.next_few_weeks || "—"}</div>
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">TAKEAWAY</div>
        <div class="takeaway-box">
          <span class="takeaway-bias" style="background:${biasColor}20;color:${biasColor};border:1px solid ${biasColor}40">${bias.toUpperCase()}</span>
          <div class="takeaway-grid">
            <div><div class="takeaway-item-label">STRATEGY</div><div class="takeaway-item-value">${tk.strategy || "—"}</div></div>
            <div><div class="takeaway-item-label">SHORT TERM · 1-2W</div><div class="takeaway-item-value">${tk.short_term || "—"}</div></div>
            <div><div class="takeaway-item-label">MEDIUM TERM · 1-3M</div><div class="takeaway-item-value">${tk.medium_term || "—"}</div></div>
          </div>
        </div>
      </div>

      <div id="sentiment-history-section">
        <div class="section-label">SENTIMENT HISTORY</div>
        <div id="sentiment-history-body" class="section-card" style="min-height:48px">
          <div class="loading" style="padding:8px 0">Loading history...</div>
        </div>
      </div>

      <div>
        <div class="section-label">EMAIL ALERTS</div>
        <div class="section-card" id="alerts-card" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 16px">
          <span style="font-size:12px;color:#8a7a60;font-weight:300">Notify me when <strong style="color:#c4b490">${name}</strong> sentiment changes</span>
          <label style="margin-left:auto;display:flex;align-items:center;gap:8px;cursor:pointer">
            <div class="toggle-wrap" onclick="toggleAlert('${name}')" id="alert-toggle-${name.replace(/ /g,'-')}" style="width:36px;height:18px;border-radius:9px;background:#2a2820;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0">
              <div class="toggle-knob" style="width:14px;height:14px;border-radius:7px;background:#6a5a40;position:absolute;top:2px;left:2px;transition:all 0.2s"></div>
            </div>
            <span id="alert-label-${name.replace(/ /g,'-')}" style="font-family:'DM Mono',monospace;font-size:9px;color:#6a5a40;letter-spacing:1px">OFF</span>
          </label>
        </div>
        <div class="section-card" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 16px;margin-top:8px">
          <span style="font-size:12px;color:#8a7a60;font-weight:300">Email me when a <strong style="color:#c4b490">new analysis</strong> is ready (every 6 hrs)</span>
          <label style="margin-left:auto;display:flex;align-items:center;gap:8px;cursor:pointer">
            <div class="toggle-wrap" onclick="toggleNotify()" id="notify-toggle" style="width:36px;height:18px;border-radius:9px;background:#2a2820;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0">
              <div class="toggle-knob" style="width:14px;height:14px;border-radius:7px;background:#6a5a40;position:absolute;top:2px;left:2px;transition:all 0.2s"></div>
            </div>
            <span id="notify-label" style="font-family:'DM Mono',monospace;font-size:9px;color:#6a5a40;letter-spacing:1px">OFF</span>
          </label>
        </div>
      </div>
    `;
  }

  function formatTime(published) {
    if (!published) return "";
    try {
      const d = new Date(published);
      return d.toLocaleDateString("en-IN", {day:"numeric", month:"short"}) + " · " + d.toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit"});
    } catch(e) { return ""; }
  }

  function renderNews(name) {
    const d = data[name];
    const articles = d?.articles || [];
    document.getElementById("news-count").textContent = articles.length + " ARTICLES";
    if (!articles.length) { document.getElementById("news-list").innerHTML = '<div class="loading">No articles found.</div>'; return; }
    document.getElementById("news-list").innerHTML = articles.map(a =>
      `<a class="news-item" href="${a.url}" target="_blank" rel="noopener">
        <div class="news-meta">
          <span class="impact-tag impact-${a.impact || 'LOW'}">${a.impact || 'LOW'}</span>
          <span class="news-source">${a.source}</span>
          <span class="news-time">${formatTime(a.published)}</span>
        </div>
        <div class="news-title">${a.title}</div>
      </a>`
    ).join('');
  }

  function renderTabs() {
    const container = document.getElementById("tabs");
    container.innerHTML = "";
    Object.keys(COLORS).forEach(name => {
      const btn = document.createElement("button");
      btn.className = "tab" + (name === activeTab ? " active" : "");
      btn.style.setProperty("--accent", COLORS[name]);
      btn.textContent = name.toUpperCase();
      btn.onclick = () => switchTab(name);
      container.appendChild(btn);
    });
  }

  function switchTab(name) {
    activeTab = name;
    renderTabs();
    renderCommodityHeader(name);
    renderAnalysisBody(name);
    renderNews(name);
    loadHistory(name);
    setTimeout(() => updateAlertToggle(name), 50);
  }

  async function loadData() {
    try {
      const res = await apiFetch("/data");
      if (!res) return;
      data = await res.json();
      renderTabs();
      renderCommodityHeader(activeTab);
      renderAnalysisBody(activeTab);
      renderNews(activeTab);
      loadHistory(activeTab);
    } catch(e) {
    }
  }

  async function triggerRun() {
    const btn = document.getElementById("run-btn");
    btn.disabled = true;
    btn.textContent = "● RUNNING…";
    try {
      const res = await apiFetch("/run", { method: "POST" });
      if (!res) return;
      if (res.status === 409) {
        btn.textContent = "ALREADY RUNNING";
        setTimeout(() => { btn.disabled = false; btn.textContent = "▶ RUN NOW"; }, 3000);
        return;
      }
      // Poll health until analysis_running goes false, then reload data
      const poll = setInterval(async () => {
        try {
          const h = await fetch("/health");
          const hj = await h.json();
          if (!hj.analysis_running) {
            clearInterval(poll);
            btn.disabled = false;
            btn.textContent = "▶ RUN NOW";
            loadData();
          }
        } catch { clearInterval(poll); btn.disabled = false; btn.textContent = "▶ RUN NOW"; }
      }, 4000);
    } catch {
      btn.disabled = false;
      btn.textContent = "▶ RUN NOW";
    }
  }

  async function loadHistory(name) {
    const el = document.getElementById("sentiment-history-body");
    if (!el) return;
    try {
      const res = await apiFetch("/history/" + encodeURIComponent(name));
      if (!res) return;
      const rows = await res.json();
      if (!rows.length) { el.innerHTML = '<div class="loading" style="padding:8px 0">No history yet.</div>'; return; }
      el.innerHTML = rows.slice(0, 15).map(r => {
        const color = SENTIMENT_COLORS[r.sentiment] || "#fbbf24";
        return `<div class="hist-bar-row">
          <span class="hist-bar-label">${r.run_at}</span>
          <span class="hist-bar-dot" style="background:${color}"></span>
          <span class="hist-bar-sentiment" style="color:${color}">${SENTIMENT_LABELS[r.sentiment] || r.sentiment}</span>
          <span style="font-family:'DM Mono',monospace;font-size:8px;color:#6a5a40;margin-left:auto">${r.articles} articles</span>
        </div>`;
      }).join("");
    } catch { el.innerHTML = '<div class="loading" style="padding:8px 0">Failed to load history.</div>'; }
  }


  function showForgot() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("register-form").style.display = "none";
    document.getElementById("forgot-form").style.display = "";
    document.getElementById("reset-form").style.display = "none";
    document.getElementById("forgot-msg").textContent = "";
    document.getElementById("forgot-msg").style.color = "#f87171";
  }

  async function submitForgot() {
    const email  = document.getElementById("forgot-email").value.trim();
    const btn    = document.getElementById("forgot-btn");
    const msgEl  = document.getElementById("forgot-msg");
    btn.disabled = true; msgEl.textContent = "";
    try {
      const res  = await fetch("/auth/forgot-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
      const data = await res.json();
      msgEl.style.color   = "#4ade80";
      msgEl.textContent   = data.message || "Reset link sent.";
    } catch { msgEl.style.color = "#f87171"; msgEl.textContent = "Connection error."; }
    finally  { btn.disabled = false; }
  }

  async function submitReset() {
    const token    = new URLSearchParams(window.location.hash.replace("#reset?","")).get("token") || "";
    const password = document.getElementById("reset-password").value;
    const btn      = document.getElementById("reset-btn");
    const msgEl    = document.getElementById("reset-msg");
    btn.disabled = true; msgEl.textContent = "";
    try {
      const res  = await fetch("/auth/reset-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token, password }) });
      const data = await res.json();
      if (!res.ok) { msgEl.style.color = "#f87171"; msgEl.textContent = data.error || "Reset failed."; return; }
      msgEl.style.color = "#4ade80";
      msgEl.textContent = "Password updated. Signing in...";
      setTimeout(() => { window.location.hash = ""; showLogin(); }, 1500);
    } catch { msgEl.style.color = "#f87171"; msgEl.textContent = "Connection error."; }
    finally  { btn.disabled = false; }
  }

  async function resendVerification() {
    const msgEl = document.getElementById("verify-msg");
    msgEl.textContent = "Sending...";
    try {
      const res = await apiFetch("/auth/resend-verification", { method: "POST" });
      if (!res) return;
      msgEl.textContent = "Sent! Check your inbox.";
    } catch { msgEl.textContent = "Failed to send."; }
  }

  function checkVerificationBanner(emailVerified) {
    const banner = document.getElementById("verify-banner");
    if (emailVerified === false) {
      banner.classList.remove("hidden");
    } else {
      banner.classList.add("hidden");
    }
  }

  // Check auth on load

  // Handle reset password link
  if (window.location.hash.startsWith("#reset?token=")) {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("register-form").style.display = "none";
    document.getElementById("forgot-form").style.display = "none";
    document.getElementById("reset-form").style.display = "";
    document.getElementById("login-overlay").classList.remove("hidden");
  }

  // Handle email verified redirect
  if (window.location.search.includes("verified=1")) {
    history.replaceState(null, "", "/app");
    // will load data below, banner will be hidden
  }

  if (!getAccess()) {
    showLoginOverlay();
  } else {
    loadData();
    loadPrices();
    // Check verification status
    apiFetch("/auth/me").then(r => r && r.json()).then(d => d && checkVerificationBanner(d.email_verified)).catch(()=>{});
  }
  setInterval(loadData, 5 * 60 * 1000);
  setInterval(loadPrices, 2 * 60 * 1000);

  // ── Email alerts ────────────────────────────────────────────────────────────
  let alertCache = {};

  async function loadAlerts() {
    try {
      const res = await apiFetch("/auth/alerts");
      if (!res || !res.ok) return;
      const list = await res.json();
      alertCache = {};
      list.forEach(a => { alertCache[a.commodity] = a.enabled; });
      updateAlertToggle(activeTab);
    } catch {}
  }

  function updateAlertToggle(name) {
    const key    = name.replace(/ /g, '-');
    const wrap   = document.getElementById("alert-toggle-" + key);
    const label  = document.getElementById("alert-label-" + key);
    if (!wrap || !label) return;
    const on = alertCache[name] === true;
    wrap.style.background  = on ? "#c8a870" : "#2a2820";
    wrap.querySelector(".toggle-knob").style.background  = on ? "#0a0908" : "#6a5a40";
    wrap.querySelector(".toggle-knob").style.left        = on ? "20px" : "2px";
    label.textContent      = on ? "ON" : "OFF";
    label.style.color      = on ? "#c8a870" : "#6a5a40";
  }

  async function toggleAlert(name) {
    const newState = !(alertCache[name] === true);
    alertCache[name] = newState;
    updateAlertToggle(name);
    try {
      await apiFetch("/auth/alerts", {
        method: "POST",
        body: JSON.stringify({ commodity: name, enabled: newState }),
      });
    } catch {}
  }

  // Load alerts after login
  const _origHideLogin = hideLoginOverlay;
  hideLoginOverlay = function() {
    _origHideLogin();
    loadAlerts();
  };

  if (getAccess()) loadAlerts();

  // ── Analysis notifications ───────────────────────────────────────────────
  let notifyEnabled = false;

  async function loadNotify() {
    try {
      const res = await apiFetch("/auth/notify");
      if (!res || !res.ok) return;
      const data = await res.json();
      notifyEnabled = data.enabled;
      updateNotifyToggle();
    } catch {}
  }

  function updateNotifyToggle() {
    const wrap  = document.getElementById("notify-toggle");
    const label = document.getElementById("notify-label");
    if (!wrap || !label) return;
    wrap.style.background = notifyEnabled ? "#c8a870" : "#2a2820";
    wrap.querySelector(".toggle-knob").style.background = notifyEnabled ? "#0a0908" : "#6a5a40";
    wrap.querySelector(".toggle-knob").style.left       = notifyEnabled ? "20px" : "2px";
    label.textContent  = notifyEnabled ? "ON" : "OFF";
    label.style.color  = notifyEnabled ? "#c8a870" : "#6a5a40";
  }

  async function toggleNotify() {
    notifyEnabled = !notifyEnabled;
    updateNotifyToggle();
    try {
      await apiFetch("/auth/notify", { method: "POST", body: JSON.stringify({ enabled: notifyEnabled }) });
    } catch {}
  }

  const _origHideLogin2 = hideLoginOverlay;
  hideLoginOverlay = function() {
    _origHideLogin2();
    loadNotify();
  };

  if (getAccess()) loadNotify();
</script>
</body>
</html>
