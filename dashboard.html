<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Commodex Research</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0e0b; color: #d4c4a0; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .header { background: #131210; border-bottom: 1px solid #2a2820; padding: 0 28px; height: 52px; display: flex; align-items: center; gap: 16px; }
    .logo { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300; color: #e8d8b0; }
    .logo-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: #c8a870; letter-spacing: 3px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 10px; color: #c8a870; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .tabs { background: #0d0c0a; border-bottom: 1px solid #2a2820; padding: 0 28px; display: flex; gap: 0; overflow-x: auto; }
    .tab { padding: 12px 18px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #c8a870; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover { color: #e8d8b0; }
    .main { display: flex; height: calc(100vh - 100px); }
    .news-col { width: 42%; border-right: 1px solid #2a2820; display: flex; flex-direction: column; overflow: hidden; }
    .col-header { padding: 12px 18px; border-bottom: 1px solid #2a2820; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2.5px; color: #c8a870; }
    .news-list { flex: 1; overflow-y: auto; }
    .news-item { padding: 13px 18px; border-bottom: 1px solid #1a1816; cursor: pointer; transition: background 0.1s; text-decoration: none; display: block; }
    .news-item:hover { background: #0c0b09; }
    .news-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .news-tag { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1.5px; padding: 1px 6px; border-radius: 2px; border: 1px solid; }
    .news-source { font-family: 'DM Mono', monospace; font-size: 8px; color: #c8a870; }
    .news-time { font-family: 'DM Mono', monospace; font-size: 8px; color: #8a7a60; margin-left: auto; }
    .news-title { font-size: 13px; color: #d4c4a0; line-height: 1.5; }
    .analysis-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .analysis-body { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .analysis-header { padding: 12px 20px; border-bottom: 1px solid #2a2820; display: flex; align-items: center; gap: 12px; }
    .analysis-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; }
    .analysis-ts { font-family: 'DM Mono', monospace; font-size: 9px; color: #c8a870; margin-top: 2px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 3px; border: 1px solid; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; margin-left: auto; }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
    .analysis-text { font-size: 13.5px; line-height: 1.85; color: #d4c4a0; max-width: 620px; }
    .analysis-text strong { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2.5px; color: #c8a870; display: block; margin: 20px 0 8px; }
    .analysis-text p { margin-bottom: 8px; }
    .analysis-text li { margin-left: 16px; margin-bottom: 4px; }
    .loading { padding: 40px 28px; font-family: 'DM Mono', monospace; font-size: 11px; color: #c8a870; }
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-thumb { background: #3a3428; border-radius: 1px; }
    .refresh-btn { margin-left: 8px; background: none; border: 1px solid #3a3428; color: #c8a870; padding: 4px 10px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; }
    .refresh-btn:hover { color: #e8d8b0; }
  </style>
</head>
<body>
<div class="header">
  <span class="logo">Commodex</span>
  <span class="logo-sub">RESEARCH</span>
  <div class="status">
    <div class="dot"></div>
    <span id="last-updated">Loading...</span>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="main">
  <div class="news-col">
    <div class="col-header">NEWS FEED</div>
    <div class="news-list" id="news-list"><div class="loading">Loading news...</div></div>
  </div>
  <div class="analysis-col">
    <div class="analysis-header">
      <div>
        <div class="analysis-title" id="analysis-title">Loading...</div>
        <div class="analysis-ts" id="analysis-ts"></div>
      </div>
      <div id="bias-badge"></div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="analysis-body">
      <div class="analysis-text" id="analysis-text"><div class="loading">Fetching analysis...</div></div>
    </div>
  </div>
</div>
<script>
  const COLORS = {
    "Gold": "#c9a84c", "Crude Oil": "#b85c38",
    "Silver": "#8faabf", "Copper": "#b87040", "Natural Gas": "#5a9e8f"
  };
  let data = {}, activeTab = "Gold";

  function formatTime(published) {
    if (!published) return "";
    try {
      const d = new Date(published);
      return d.toLocaleDateString("en-IN", {day:"numeric",month:"short"}) + " · " + d.toLocaleTimeString("en-IN", {hour:"2-digit",minute:"2-digit"});
    } catch(e) { return ""; }
  }

  async function loadData() {
    try {
      const res = await fetch("http://localhost:5000/data");
      data = await res.json();
      renderTabs();
      renderView(activeTab);
      document.getElementById("last-updated").textContent = "Updated " + new Date().toLocaleTimeString("en-IN", {hour:"2-digit",minute:"2-digit"});
    } catch(e) {
      document.getElementById("last-updated").textContent = "Cannot connect — is analysis.py running?";
    }
  }

  function renderTabs() {
    const container = document.getElementById("tabs");
    container.innerHTML = "";
    Object.keys(COLORS).forEach(name => {
      const btn = document.createElement("button");
      btn.className = "tab" + (name === activeTab ? " active" : "");
      btn.style.setProperty("--accent", COLORS[name]);
      btn.textContent = name.toUpperCase();
      btn.onclick = () => { activeTab = name; renderTabs(); renderView(name); };
      container.appendChild(btn);
    });
  }

  function renderView(name) {
    const d = data[name]; if (!d) return;
    const color = COLORS[name];
    document.getElementById("analysis-title").textContent = name;
    document.getElementById("analysis-title").style.color = color;
    document.getElementById("analysis-ts").textContent = "Generated " + d.timestamp + " · " + d.count + " articles analysed";
    const text = d.analysis || "";
    const isBull = text.toUpperCase().includes("BULLISH");
    const isBear = text.toUpperCase().includes("BEARISH");
    const bias = isBull ? "BULLISH" : isBear ? "BEARISH" : "NEUTRAL";
    const bc = isBull ? {bg:"#16301a",border:"#22c55e30",color:"#4ade80",dot:"#22c55e"}
             : isBear ? {bg:"#301616",border:"#ef444430",color:"#f87171",dot:"#ef4444"}
             :          {bg:"#302616",border:"#f59e0b30",color:"#fbbf24",dot:"#f59e0b"};
    document.getElementById("bias-badge").innerHTML = '<div class="badge" style="background:' + bc.bg + ';border-color:' + bc.border + ';color:' + bc.color + '"><div class="badge-dot" style="background:' + bc.dot + '"></div>' + bias + '</div>';
    let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/^## (.*)/gm, '<strong>$1</strong>').replace(/^- (.*)/gm, '<li>$1</li>').replace(/^\d+\. (.*)/gm, '<li>$1</li>').split('\n').map(l => l.startsWith('<li>') ? l : '<p>' + l + '</p>').join('');
    document.getElementById("analysis-text").innerHTML = html;
    const articles = d.articles || [];
    const newsList = document.getElementById("news-list");
    if (!articles.length) { newsList.innerHTML = '<div class="loading">No articles found.</div>'; return; }
    newsList.innerHTML = articles.map(a => '<a class="news-item" href="' + a.url + '" target="_blank" rel="noopener"><div class="news-meta"><span class="news-tag" style="color:' + color + ';border-color:' + color + '33">' + name.toUpperCase() + '</span><span class="news-source">' + a.source + '</span><span class="news-time">' + formatTime(a.published) + '</span></div><div class="news-title">' + a.title + '</div></a>').join('');
  }

  loadData();
  setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
